name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore and build
        run: dotnet build HomoeoDesk.sln --configuration Release
      - name: Validate deployment manifests
        run: |
          test -f homoeodesk.azure/deployment/global.json
          test -f homoeodesk.azure/deployment/tenants.json
          test -f homoeodesk.azure/deployment/website.json

  build-frontends:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - homoeodesk.global/homoeodesk.global.web
          - homoeodesk.tenant/homoeodesk.tenant.web
          - homoeodesk.website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Build ${{ matrix.app }}
        working-directory: ${{ matrix.app }}
        run: |
          npm ci
          npm run build

  build-databases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Build database projects
        run: pwsh -File scripts/build-dacpac.ps1 -Project all -Configuration Release
