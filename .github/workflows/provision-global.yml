name: Provision Global Stamp

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, uat, prod]

env:
  AZURE_RESOURCE_PREFIX: tr-hd
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy global infrastructure
        run: |
          RG="rg-${AZURE_RESOURCE_PREFIX}-${{ inputs.environment }}-global"
          az group create --name "$RG" --location centralindia --tags environment=${{ inputs.environment }} product=homoeodesk stamp=global
          az deployment group create \
            --resource-group "$RG" \
            --template-file homoeodesk.azure/iac/main.bicep \
            --parameters stampType=global environment=${{ inputs.environment }} azureResourcePrefix=${AZURE_RESOURCE_PREFIX}

      - name: Publish global API
        run: dotnet publish homoeodesk.global/homoeodesk.global.api/homoeodesk.global.api.csproj -c Release -o ./publish/global-api

      - name: Build global web
        working-directory: homoeodesk.global/homoeodesk.global.web
        run: |
          npm ci
          npm run build

      - name: Deploy global API (zip)
        run: |
          RG="rg-${AZURE_RESOURCE_PREFIX}-${{ inputs.environment }}-global"
          APP="api-${AZURE_RESOURCE_PREFIX}-${{ inputs.environment }}-global"
          cd publish/global-api && zip -r ../global-api.zip .
          az webapp deployment source config-zip \
            --resource-group "$RG" \
            --name "$APP" \
            --src ../global-api.zip
